spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  jpa:
    show-sql: false

  flyway:
    clean-disabled: true

logging:
  level:
    com.example.marketrix: INFO
    root: WARN

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://marketrix.io}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
